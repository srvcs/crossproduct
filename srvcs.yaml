schemaVersion: 1
name: "srvcs-crossproduct"
slug: "crossproduct"
repository: "srvcs/crossproduct"
package: "srvcs-crossproduct"
function: "vectors: 3D cross product"
kind: "orchestrator"
categories:
  - "vectors"
dependencies:
  - slug: "floatmultiply"
    service: "srvcs-floatmultiply"
  - slug: "floatsubtract"
    service: "srvcs-floatsubtract"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "a"
    type: "json[]"
    required: true
  - name: "b"
    type: "json[]"
    required: true
outputs:
  - name: "a"
    type: "json[]"
  - name: "b"
    type: "json[]"
  - name: "result"
    type: "number[]"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_FLOATMULTIPLY_URL"
    default: ""
    purpose: "Base URL for srvcs-floatmultiply"
  - name: "SRVCS_FLOATSUBTRACT_URL"
    default: ""
    purpose: "Base URL for srvcs-floatsubtract"
